# Backend runtime configuration for local development.
server:
  port: 8080
spring:
  application:
    name: rangwaz-image-site
  datasource:
    url: jdbc:mysql://localhost:3306/rangwaz_image_dev?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: rangwaz
    password: rangwaz123
    hikari:
      maximum-pool-size: 12
      minimum-idle: 2
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 800ms
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 60MB
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
mybatis:
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.rangwaz.imagesite.entity
springdoc:
  swagger-ui:
    path: /swagger-ui.html
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
app:
  upload-root: storage/uploads
  public-upload-prefix: /uploads
