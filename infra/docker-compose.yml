# Development middleware for the RanGwaz image site.
services:
  mysql:
    image: mysql:8.4
    container_name: rangwaz-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: rangwaz_image_dev
      MYSQL_USER: rangwaz
      MYSQL_PASSWORD: rangwaz123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - rangwaz-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7.4-alpine
    container_name: rangwaz-redis
    ports:
      - "6379:6379"
    volumes:
      - rangwaz-redis-data:/data
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: rangwaz-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - rangwaz-minio-data:/data

volumes:
  rangwaz-mysql-data:
  rangwaz-redis-data:
  rangwaz-minio-data:
